<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cheapsawari — fare bucket tracker</title>
<style>
  :root {
    --bg: #0f1419; --panel: #1a2129; --line: #2a3441; --text: #e6edf3;
    --muted: #8b98a5; --accent: #4cc9f0; --good: #2ecc71; --good-bg: #173d2a;
    --warn: #f0a04c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg); color: var(--text);
  }
  header {
    padding: 20px 24px; border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 20px; letter-spacing: .5px; }
  header .sub { color: var(--muted); font-size: 13px; }
  header .spacer { flex: 1; }
  main { padding: 24px; max-width: 1000px; margin: 0 auto; }
  .add {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: end;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px; margin-bottom: 22px;
  }
  .add label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
  .add input, .add select {
    background: var(--bg); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 8px 10px; font: inherit; min-width: 90px;
  }
  button {
    background: var(--accent); color: #03242e; border: 0; border-radius: 6px;
    padding: 9px 14px; font: inherit; font-weight: 600; cursor: pointer;
  }
  button.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); font-weight: 500; }
  button:active { transform: translateY(1px); }
  .cards { display: grid; gap: 14px; }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 16px; display: grid; grid-template-columns: 1fr auto; gap: 8px 16px; align-items: center;
  }
  .route { font-size: 18px; font-weight: 600; }
  .route .tag {
    font-size: 11px; font-weight: 600; color: var(--accent); vertical-align: middle;
    border: 1px solid var(--line); border-radius: 999px; padding: 1px 8px; margin-left: 6px;
  }
  .legs {
    grid-column: 1 / -1; display: flex; gap: 18px; flex-wrap: wrap;
    color: var(--muted); font-size: 12.5px;
  }
  .mc { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .mc-hint { font-size: 12.5px; color: var(--muted); }
  .legrow { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .legrow input { background: var(--bg); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; font: inherit; }
  .legrow input.lo, .legrow input.ld { width: 80px; text-transform: uppercase; }
  .legrow input.lflex { width: 70px; }
  .legrow .arrow { color: var(--muted); }
  .meta { color: var(--muted); font-size: 13px; }
  .price { font-size: 22px; font-weight: 700; text-align: right; }
  .price small { font-size: 13px; color: var(--muted); font-weight: 500; }
  .spark { grid-column: 1 / -1; }
  .row2 { grid-column: 1 / -1; display: flex; align-items: center; gap: 12px; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px;
    border-radius: 999px; font-size: 12px; font-weight: 600;
  }
  .badge.reopened { background: var(--good-bg); color: var(--good); border: 1px solid var(--good); }
  .badge.watching { background: transparent; color: var(--muted); border: 1px solid var(--line); }
  .badge.nodata { background: transparent; color: var(--warn); border: 1px solid var(--line); }
  .row2 .spacer { flex: 1; }
  .empty, .error { color: var(--muted); text-align: center; padding: 40px; }
  .error { color: #ff6b6b; }
  a { color: var(--accent); }
  .navlink { font-size: 13px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px; text-decoration: none; }
</style>
</head>
<body>
<header>
  <h1>✈️ cheapsawari</h1>
  <span class="sub">fare-bucket tracker · provider: <b id="provider">…</b></span>
  <span class="spacer"></span>
  <span class="sub" id="who"></span>
  <a class="navlink" id="adminLink" href="/admin" hidden>Admin</a>
  <button class="ghost" id="refresh">↻ Refresh</button>
  <button class="ghost" id="logout">Sign out</button>
</header>
<main>
  <form class="add" id="addForm">
    <label>Trip
      <select id="tripType">
        <option value="one_way">One-way</option>
        <option value="round_trip">Round-trip</option>
        <option value="multi_city">Multi-city</option>
      </select>
    </label>
    <label class="simple">Origin<input id="origin" maxlength="3" placeholder="DTW" required></label>
    <label class="simple">Destination<input id="destination" maxlength="3" placeholder="AMD" required></label>
    <label class="simple">Departure<input id="date" type="date" required></label>
    <label class="simple">± days<input id="departFlex" type="number" min="0" max="21" value="0" title="Also search this many days after the departure date"></label>
    <label class="rt" hidden>Return<input id="returnDate" type="date"></label>
    <label class="rt" hidden>± days<input id="returnFlex" type="number" min="0" max="21" value="0" title="Also search this many days after the return date"></label>
    <label>Cabin
      <select id="cabin">
        <option>ECONOMY</option><option>PREMIUM_ECONOMY</option>
        <option>BUSINESS</option><option>FIRST</option>
      </select>
    </label>
    <button type="submit">+ Track</button>
    <div class="mc" id="mcBuilder" hidden>
      <div class="mc-hint">Add each leg in order. Tip: route through a city to track a
        <b>transfer airport</b> (DTW→CDG→AMD), or set your first <b>port of entry</b> on the
        way home (AMD→JFK→DTW).</div>
      <div id="legRows"></div>
      <button type="button" class="ghost" id="addLeg">+ Add leg</button>
    </div>
  </form>
  <div id="cards" class="cards"></div>
  <div id="status"></div>
</main>

<script>
const API = "/api/v1";
const $ = (id) => document.getElementById(id);
const fmt = (n) => Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

async function jget(url) {
  const r = await fetch(url);
  if (r.status === 401) { location.href = "/login"; throw new Error("unauthorized"); }
  if (!r.ok) throw new Error(url + " → " + r.status);
  return r.json();
}

// Populate the signed-in user bar; reveal the Admin link only for the owner.
async function whoami() {
  try {
    const me = await jget("/api/v1/auth/me");
    $("who").textContent = me.email;
    $("adminLink").hidden = !me.is_admin;
  } catch (e) { /* jget already redirected on 401 */ }
}

// Inline-SVG sparkline of a chronological price series.
function sparkline(prices) {
  if (prices.length < 2) return "";
  const W = 600, H = 40, pad = 2;
  const min = Math.min(...prices), max = Math.max(...prices);
  const span = max - min || 1;
  const pts = prices.map((p, i) => {
    const x = pad + (i * (W - 2 * pad)) / (prices.length - 1);
    const y = H - pad - ((p - min) / span) * (H - 2 * pad);
    return x.toFixed(1) + "," + y.toFixed(1);
  }).join(" ");
  const last = prices[prices.length - 1], first = prices[0];
  const stroke = last < first ? "var(--good)" : "var(--accent)";
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" width="100%" height="40">
    <polyline fill="none" stroke="${stroke}" stroke-width="2" points="${pts}"/>
  </svg>`;
}

function badge(signal, hasData) {
  if (signal && signal.detected) {
    const s = signal.signal;
    return `<span class="badge reopened">▼ Bucket reopened −${fmt(s.drop_pct)}%</span>`;
  }
  if (hasData) return `<span class="badge watching">watching</span>`;
  return `<span class="badge nodata">no data yet</span>`;
}

// Format a leg's anchor date with its flexibility window, e.g. "2026-12-08 (+6d)".
const flexLabel = (d, flex) => d + (flex > 0 ? ` (+${flex}d)` : "");

// The route headline: one-way "A → B", round-trip "A ⇄ B", multi-city "A → B → C → …".
function routeLabel(w) {
  if (w.trip_type === "multi_city" && w.legs && w.legs.length) {
    const chain = [w.legs[0].origin, ...w.legs.map((l) => l.destination)];
    return chain.join(" → ");
  }
  return `${w.origin} ${w.trip_type === "round_trip" ? "⇄" : "→"} ${w.destination}`;
}

function tripTag(w) {
  if (w.trip_type === "round_trip") return '<span class="tag">round-trip</span>';
  if (w.trip_type === "multi_city") return `<span class="tag">multi-city · ${w.legs ? w.legs.length : 0} legs</span>`;
  return "";
}

// Per-leg price breakdown from the latest snapshot (round-trip = 2 legs, multi-city = N).
function legsLine(w, latest) {
  if (!latest || !latest.legs || latest.legs.length < 2) return "";
  const segs = latest.legs.map(
    (l) => `<span>${l.origin}→${l.destination} ${l.date} · ${fmt(l.price)}</span>`
  ).join("");
  return `<div class="legs">${segs}</div>`;
}

// The dates/flex summary under the route, by trip shape.
function datesLine(w) {
  if (w.trip_type === "multi_city") {
    return w.legs ? w.legs.map((l) => flexLabel(l.date, l.flex_days)).join(" → ") : "";
  }
  if (w.trip_type === "round_trip") {
    return `${flexLabel(w.departure_date, w.depart_flex_days)} ⇄ ${flexLabel(w.return_date, w.return_flex_days)}`;
  }
  return flexLabel(w.departure_date, w.depart_flex_days);
}

function card(w, snaps, signal) {
  // snapshots arrive newest-first; chronological for the sparkline.
  const chrono = [...snaps].reverse();
  const prices = chrono.map((s) => s.price);
  const latest = snaps.length ? snaps[0] : null;
  return `<div class="card" data-id="${w.id}">
    <div>
      <div class="route">${routeLabel(w)} ${tripTag(w)}</div>
      <div class="meta">${datesLine(w)} · ${w.cabin}${w.active ? "" : " · paused"}</div>
    </div>
    <div class="price">${latest ? fmt(latest.price) : "—"}<small>${latest ? " " + latest.currency : ""}</small></div>
    ${legsLine(w, latest)}
    ${sparkline(prices)}
    <div class="row2">
      ${badge(signal, snaps.length > 0)}
      <span class="meta">${snaps.length} snapshot${snaps.length === 1 ? "" : "s"}</span>
      <span class="spacer"></span>
      <button class="ghost del">Delete</button>
    </div>
  </div>`;
}

async function load() {
  $("status").textContent = "";
  whoami();
  try {
    jget("/health").then((h) => ($("provider").textContent = h.provider)).catch(() => {});
    const watches = await jget(API + "/watches");
    if (!watches.length) {
      $("cards").innerHTML = "";
      $("status").innerHTML = `<div class="empty">No watches yet — add a route above to start tracking fare buckets.</div>`;
      return;
    }
    // Fetch each watch's history + signal in parallel.
    const enriched = await Promise.all(watches.map(async (w) => {
      const [snaps, signal] = await Promise.all([
        jget(`${API}/watches/${w.id}/snapshots?limit=100`).catch(() => []),
        jget(`${API}/watches/${w.id}/signal`).catch(() => null),
      ]);
      return { w, snaps, signal };
    }));
    $("cards").innerHTML = enriched.map(({ w, snaps, signal }) => card(w, snaps, signal)).join("");
  } catch (e) {
    $("cards").innerHTML = "";
    $("status").innerHTML = `<div class="error">Failed to load: ${e.message}</div>`;
  }
}

// One leg-builder row for multi-city.
function addLegRow(origin = "", dest = "") {
  const row = document.createElement("div");
  row.className = "legrow";
  row.innerHTML =
    `<input class="lo" maxlength="3" placeholder="From" value="${origin}">` +
    `<span class="arrow">→</span>` +
    `<input class="ld" maxlength="3" placeholder="To" value="${dest}">` +
    `<input class="ldate" type="date">` +
    `<input class="lflex" type="number" min="0" max="21" value="0" title="± days">` +
    `<button type="button" class="ghost rmLeg" title="Remove leg">✕</button>`;
  $("legRows").appendChild(row);
}

// Switch the form between one-way / round-trip / multi-city.
function syncTripType() {
  const t = $("tripType").value;
  const simple = t !== "multi_city";
  document.querySelectorAll(".add .simple").forEach((el) => (el.hidden = !simple));
  document.querySelectorAll(".add .rt").forEach((el) => (el.hidden = t !== "round_trip"));
  $("mcBuilder").hidden = t !== "multi_city";
  // Required only applies to visible inputs (hidden required fields block submit).
  ["origin", "destination", "date"].forEach((id) => ($(id).required = simple));
  $("returnDate").required = t === "round_trip";
  // Seed two leg rows the first time multi-city is opened.
  if (t === "multi_city" && $("legRows").children.length === 0) { addLegRow(); addLegRow(); }
}
$("tripType").addEventListener("change", syncTripType);
$("addLeg").addEventListener("click", () => addLegRow());
$("legRows").addEventListener("click", (e) => {
  if (!e.target.classList.contains("rmLeg")) return;
  if ($("legRows").children.length <= 2) return; // multi-city needs ≥ 2 legs
  e.target.closest(".legrow").remove();
});

$("addForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const tripType = $("tripType").value;
  let body;
  if (tripType === "multi_city") {
    const legs = [...$("legRows").children].map((row) => ({
      origin: row.querySelector(".lo").value.trim().toUpperCase(),
      destination: row.querySelector(".ld").value.trim().toUpperCase(),
      date: row.querySelector(".ldate").value,
      flex_days: Number(row.querySelector(".lflex").value) || 0,
    })).filter((l) => l.origin && l.destination && l.date);
    if (legs.length < 2) {
      $("status").innerHTML = `<div class="error">Add at least 2 complete legs.</div>`;
      return;
    }
    body = { trip_type: "multi_city", cabin: $("cabin").value, legs };
  } else {
    body = {
      origin: $("origin").value.trim().toUpperCase(),
      destination: $("destination").value.trim().toUpperCase(),
      departure_date: $("date").value,
      cabin: $("cabin").value,
      trip_type: tripType,
      depart_flex_days: Number($("departFlex").value) || 0,
    };
    if (tripType === "round_trip") {
      body.return_date = $("returnDate").value;
      body.return_flex_days = Number($("returnFlex").value) || 0;
    }
  }
  const r = await fetch(API + "/watches", {
    method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body),
  });
  if (r.status === 401) { location.href = "/login"; return; }
  if (r.ok) {
    $("addForm").reset();
    $("legRows").innerHTML = "";
    syncTripType();
    load();
  } else {
    let d = `Could not add watch (${r.status}).`;
    try { const j = await r.json(); if (typeof j.detail === "string") d = j.detail; } catch {}
    $("status").innerHTML = `<div class="error">${d}</div>`;
  }
});

$("refresh").addEventListener("click", load);

$("logout").addEventListener("click", async () => {
  await fetch("/api/v1/auth/logout", { method: "POST" });
  location.href = "/login";
});

$("cards").addEventListener("click", async (e) => {
  if (!e.target.classList.contains("del")) return;
  const id = e.target.closest(".card").dataset.id;
  if (!confirm("Delete this watch and its price history?")) return;
  await fetch(`${API}/watches/${id}`, { method: "DELETE" });
  load();
});

load();
</script>
</body>
</html>
