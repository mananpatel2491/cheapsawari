<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · cheapsawari</title>
<style>
  :root {
    --bg: #0f1419; --panel: #1a2129; --line: #2a3441; --text: #e6edf3;
    --muted: #8b98a5; --accent: #4cc9f0; --bad: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg); color: var(--text);
  }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 32px; width: min(92vw, 380px); text-align: center;
  }
  h1 { margin: 0 0 4px; font-size: 24px; letter-spacing: .5px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .signin { display: grid; place-items: center; min-height: 44px; }
  .dev { display: grid; gap: 10px; text-align: left; }
  .dev label { font-size: 12px; color: var(--muted); }
  .dev input {
    width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 10px 12px; font: inherit;
  }
  button {
    background: var(--accent); color: #03242e; border: 0; border-radius: 8px;
    padding: 11px 14px; font: inherit; font-weight: 600; cursor: pointer; width: 100%;
  }
  .pill {
    display: inline-block; margin-bottom: 18px; padding: 3px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600; color: var(--muted); border: 1px solid var(--line);
  }
  .msg { margin-top: 16px; font-size: 13px; min-height: 18px; }
  .msg.bad { color: var(--bad); }
</style>
</head>
<body>
<div class="card">
  <h1>✈️ cheapsawari</h1>
  <div class="sub">fare-bucket tracker — invitation only</div>
  <div id="modePill" class="pill" hidden></div>
  <!-- Production renders only the Google button here. The dev-mode email login is built
       dynamically in JS (see below) and ONLY when the server reports AUTH_MODE=dev, so it
       never ships to the production page (no DOM, no view-source). -->
  <div id="googleBtn" class="signin"></div>
  <div id="msg" class="msg"></div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const msg = (t, bad) => { const m = $("msg"); m.textContent = t || ""; m.className = "msg" + (bad ? " bad" : ""); };

async function onCredential(idToken, body) {
  msg("Signing in…");
  const r = await fetch("/api/v1/auth/" + (idToken ? "google" : "dev"), {
    method: "POST", headers: { "content-type": "application/json" },
    body: JSON.stringify(idToken ? { credential: idToken } : body),
  });
  if (r.ok) { location.href = "/"; return; }
  let detail = "Sign-in failed (" + r.status + ").";
  try { detail = (await r.json()).detail || detail; } catch {}
  msg(detail, true);
}

async function init() {
  let cfg;
  try { cfg = await (await fetch("/api/v1/auth/config")).json(); }
  catch { msg("Cannot reach the server.", true); return; }

  if (cfg.mode === "google" && cfg.google_client_id) {
    // Load Google Identity Services and render the official button.
    await new Promise((res, rej) => {
      const s = document.createElement("script");
      s.src = "https://accounts.google.com/gsi/client"; s.async = true; s.defer = true;
      s.onload = res; s.onerror = rej; document.head.appendChild(s);
    }).catch(() => msg("Could not load Google sign-in.", true));
    if (!window.google) return;
    google.accounts.id.initialize({
      client_id: cfg.google_client_id,
      callback: (resp) => onCredential(resp.credential),
    });
    google.accounts.id.renderButton($("googleBtn"), { theme: "filled_blue", size: "large", width: 300 });
  } else {
    // Dev mode ONLY (AUTH_MODE=dev): build a passwordless email login at runtime. This
    // markup never exists on the production page. The matching /api/v1/auth/dev endpoint
    // is itself hard-disabled (404) unless AUTH_MODE=dev, so it's defense-in-depth.
    $("modePill").hidden = false;
    $("modePill").textContent = "DEV MODE · local only · no password";
    $("googleBtn").hidden = true;
    const form = document.createElement("form");
    form.className = "dev";
    form.innerHTML =
      '<label>Email (dev login — no password, allowlist still enforced)' +
      '<input id="devEmail" type="email" placeholder="you@example.com" autocomplete="email" required>' +
      '</label><button type="submit">Sign in</button>';
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      onCredential(null, { email: $("devEmail").value.trim().toLowerCase() });
    });
    $("googleBtn").insertAdjacentElement("afterend", form);
  }
}
init();
</script>
</body>
</html>
